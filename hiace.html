.car-card {
  width: 100%;
  max-width: 900px;
  margin: 30px auto;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);

.car-card:hover {

.car-card img {

}

.rent-button:hover {
